<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neelabhro Roy</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
  <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.6.3/css/font-awesome.min.css" rel="stylesheet" integrity="sha384-T8Gy5hrqNKT+hzMclPo118YTQO6cYprQmhrYwIiQ/3axmI1hQomh7Ud2hPOy8SP1" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-social/5.0.0/bootstrap-social.min.css" />
  <script src="https://code.jquery.com/jquery-2.2.4.min.js" integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44=" crossorigin="anonymous"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
  <style type="text/css">
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #5f6b7a;
      --line: #e6ebf2;
      --accent: #1f6feb;
      --accent-soft: #eaf2ff;
      --shadow: 0 10px 30px rgba(31, 41, 55, 0.08);
      --radius: 18px;
    }

    html { scroll-behavior: smooth; }
    body {
      background: linear-gradient(180deg, #f8fafc 0%, #f5f7fb 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding-top: 78px;
      line-height: 1.7;
    }

    .navbar {
      background: rgba(255,255,255,0.96);
      border: 0;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(10px);
    }

    .navbar-brand {
      font-weight: 700;
      color: var(--text) !important;
      letter-spacing: 0.2px;
    }

    .navbar-nav > li > a {
      color: #334155 !important;
      font-weight: 600;
      border-bottom: none !important;
    }

    .navbar-nav > li > a:hover,
    .navbar-nav > li > a:focus {
      color: var(--accent) !important;
      background: transparent !important;
    }

    .container-main {
      max-width: 1120px;
    }

    .section-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 26px 28px;
      margin-bottom: 26px;
    }

    .section-shell h2 {
      margin-top: 0;
      font-weight: 700;
      font-size: 30px;
      letter-spacing: -0.3px;
    }

    .section-shell hr {
      border-top: 1px solid var(--line);
      margin-top: 12px;
      margin-bottom: 22px;
    }

    .hero {
      padding: 34px 36px;
      background: linear-gradient(135deg, #ffffff 0%, #f6faff 100%);
      overflow: hidden;
      position: relative;
    }

    .hero:before {
      content: "";
      position: absolute;
      right: -80px;
      top: -80px;
      width: 240px;
      height: 240px;
      background: radial-gradient(circle, rgba(31, 111, 235, 0.16), rgba(31, 111, 235, 0));
      border-radius: 50%;
    }

    .muted { color: var(--muted); }

    .pill {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      margin: 0 8px 10px 0;
    }

    .profile-pic {
      width: 100%;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .card-lite {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 18px 18px 14px;
      background: #fff;
      margin-bottom: 16px;
    }

    .card-lite h3, .card-lite h4 {
      margin-top: 0;
      font-weight: 700;
    }

    .meta {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }

    .btn-soft {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text) !important;
      text-decoration: none !important;
      margin: 4px 8px 0 0;
      font-weight: 600;
    }

    .btn-soft:hover {
      border-color: var(--accent);
      color: var(--accent) !important;
      text-decoration: none !important;
    }

    .timeline-item,
    .news-item,
    .pub-item {
      border-left: 3px solid #dbe7fb;
      padding-left: 16px;
      margin-bottom: 18px;
    }

    .timeline-item:last-child,
    .news-item:last-child,
    .pub-item:last-child {
      margin-bottom: 0;
    }

    .timeline-date,
    .news-date {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }

    a:not(.navbar-brand):not(.btn-social-icon):not(.btn-soft) {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid #cfd8e3;
    }

    a:not(.navbar-brand):not(.btn-social-icon):not(.btn-soft):hover,
    a:not(.navbar-brand):not(.btn-social-icon):not(.btn-soft):focus {
      color: var(--accent) !important;
      border-bottom-color: var(--accent);
      text-decoration: none;
    }

    ul.clean-list {
      list-style: none;
      padding-left: 0;
      margin-bottom: 0;
    }

    ul.clean-list li { margin-bottom: 10px; }

    .footer-note {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      padding: 8px 0 26px;
    }

    @media (max-width: 767px) {
      body { padding-top: 66px; }
      .section-shell, .hero { padding: 22px 20px; }
      .section-shell h2 { font-size: 26px; }
      .profile-pic { margin-bottom: 18px; }
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-default navbar-fixed-top">
    <div class="container container-main">
      <div class="navbar-header">
        <button type="button" class="navbar-toggle collapsed" data-toggle="collapse" data-target="#site-navbar" aria-expanded="false">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" href="#about">Neelabhro Roy</a>
      </div>

      <div class="collapse navbar-collapse" id="site-navbar">
        <ul class="nav navbar-nav navbar-right">
          <li><a href="#about">About</a></li>
          <li><a href="#news">News</a></li>
          <li><a href="#publications">Publications</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="#experience">Experience</a></li>
          <li><a href="#education">Education</a></li>
          <li><a href="#achievements">Highlights</a></li>
          <li><a href="#contact">Contact</a></li>
          <li><a target="_blank" href="https://github.com/neelabhro/">GitHub</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container container-main">
    <div id="about"></div>
    <div id="news"></div>
    <div id="publications"></div>
    <div id="projects"></div>
    <div id="experience"></div>
    <div id="education"></div>
    <div id="achievements"></div>
    <div id="contact"></div>
    <div class="footer-note">Built as a lightweight static site for simple GitHub Pages updates.</div>
  </div>

  <script type="text/javascript">
    $(document).ready(function() {
      $("#about").load("templates/about.html");
      $("#news").load("templates/news.html");
      $("#publications").load("templates/publications.html");
      $("#projects").load("templates/projects.html");
      $("#experience").load("templates/experience.html");
      $("#education").load("templates/education.html");
      $("#achievements").load("templates/achievements.html");
      $("#contact").load("templates/contact.html");
    });
  </script>
</body>
</html>
